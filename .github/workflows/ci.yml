name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Smart Contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt -- --check
        working-directory: .
      - run: cargo clippy -- -D warnings
      - run: cargo test
      - run: cargo test --test fuzz_tests
      - run: cargo test --test integration_tests
      - name: Check WASM size
        run: |
          cargo build --target wasm32-unknown-unknown --release
          for wasm in target/wasm32-unknown-unknown/release/*.wasm; do
            SIZE=$(wc -c < "$wasm" | tr -d ' ')
            echo "$wasm: $SIZE bytes"
            if [ "$SIZE" -gt 204800 ]; then
              echo "ERROR: Binary too large for deployment"
              exit 1
            fi
          done

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test -- --coverage

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          NEXT_PUBLIC_INVOICE_CONTRACT_ID: CBQ4R3B7ZQFMPP5X6Y7ZQ4R3B7ZQFMPP5X6Y7ZQ4R3B7ZQFM
          NEXT_PUBLIC_POOL_CONTRACT_ID: CD4R3B7ZQFMPP5X6Y7ZQ4R3B7ZQFMPP5X6Y7ZQ4R3B7ZQFM3B7
      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

  lighthouse:
    name: Lighthouse CI
    needs: [e2e]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install chromium
      - name: Build and run Lighthouse CI
        run: npx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 30
